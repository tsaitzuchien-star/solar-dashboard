name: 自動抓取發電數據機器人

on:
  schedule:
    # 這裡設定每小時的 05, 20, 35, 50 分會自動執行 (避開整點尖峰時段)
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch: # 這裡保留手動執行的按鈕，方便你測試

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4 # 升級至 v4 (消滅 Node.js 20 警告)

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5 # 升級至 v5 (消滅 Node.js 20 警告)
        with:
          python-version: '3.10'

      - name: 📦 安裝必備套件與隱形瀏覽器
        run: |
          pip install requests playwright gspread oauth2client
          playwright install chromium

      - name: 🔑 產出 Google 臨時金鑰
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > key.json

      - name: 🤖 啟動機器人去 T-REC 抓資料！
        env:
          TREC_ACCOUNT: ${{ secrets.TREC_ACCOUNT }}
          TREC_PASSWORD: ${{ secrets.TREC_PASSWORD }}
        run: python auto_bot.py
